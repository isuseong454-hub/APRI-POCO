<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>APRI POCO · 원가</title>
  <meta name="theme-color" content="#F4F1EA">
  <link rel="icon" href="favicon-32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="APRI POCO">
  <meta name="mobile-web-app-capable" content="yes">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
<style>
:root{
  --paper:#F4F1EA; --paper2:#ECEAE1; --card:#FBFAF6; --ink:#1A1815; --ink2:#46433d;
  --mute:#9A958A; --hair:#E1DDD3; --hair2:#D5D0C4;
  /* 살구 포인트 (NS16 살구물 / NS17 살구즙 / NS18 살구청) */
  --apri-water:#F4C9A6; --apri-juice:#F29A4B; --apri-syrup:#EAA468; --apri-bg:#F8ECE0;
  --accent:#C9742E; /* 진한 살구 — 포인트 텍스트(권장가·판정 등) */
  --gold:#C99A2E; --sage:#5F7A4E;
}
/* 축하 효과 */
.celebrate{position:fixed;inset:0;z-index:800;pointer-events:none;overflow:hidden}
.confetti{position:absolute;top:-12px;width:10px;height:10px;border-radius:2px;opacity:0;animation:fall 1.25s ease-in forwards}
@keyframes fall{0%{opacity:0;transform:translateY(0) rotate(0)}10%{opacity:1}100%{opacity:0;transform:translateY(105vh) rotate(540deg)}}
.win-badge{display:inline-block;background:linear-gradient(135deg,#F4D06A,#E0A93C);color:#5a4410;font-weight:900;font-size:11px;letter-spacing:.02em;padding:3px 9px;border-radius:999px;box-shadow:0 1px 4px rgba(200,150,40,.3)}
.gauge>i.win{background:linear-gradient(90deg,#F4C95E,#E0A93C,#F4D06A);background-size:200% 100%;animation:shine 2s linear infinite}
@keyframes shine{0%{background-position:0 0}100%{background-position:200% 0}}
.streak{color:#D08527;font-weight:900}
/* ===== 로그인 잠금 / 관리자 ===== */
.lk-ov{position:fixed;inset:0;z-index:900;background:radial-gradient(120% 80% at 50% 0%,#FBF6EE 0%,#F4F1EA 55%,#EFEAE0 100%);display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:46px 22px 40px}
.lk-ov.show{display:flex;animation:lkfade .4s ease}
@keyframes lkfade{from{opacity:0}to{opacity:1}}
.lk-glow{position:fixed;top:4%;left:50%;width:330px;height:330px;transform:translateX(-50%);background:radial-gradient(circle,rgba(242,154,75,.22),transparent 65%);filter:blur(8px);pointer-events:none;animation:lkbreath 5.5s ease-in-out infinite}
@keyframes lkbreath{0%,100%{opacity:.6;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.08)}}
.lk-card{position:relative;width:100%;max-width:360px;text-align:center;z-index:1;margin:auto}
.lk-fairy{display:inline-block;line-height:0}
.lk-fairy svg{width:92px;height:auto;animation:lkfloat 4.2s ease-in-out infinite}
@keyframes lkfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.lk-word{font-weight:900;font-size:22px;letter-spacing:.16em;margin-top:8px}
.lk-word b{color:var(--accent)}
.lk-est{font-size:14px;color:var(--mute);font-style:italic;font-family:'Cormorant Garamond',serif;margin-top:1px}
.lk-title{font-size:18px;font-weight:800;margin-top:22px}
.lk-desc{font-size:13px;color:var(--mute);margin-top:7px;line-height:1.6}
.lk-flabel{font-size:11px;font-weight:700;color:var(--mute);text-align:center;margin:13px 0 0;letter-spacing:.04em}
.pin-row{display:flex;gap:11px;justify-content:center;margin:10px 0 2px}
.pin-row.shake{animation:pinshake .42s}
@keyframes pinshake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
.pin-box{width:54px;height:62px;border:1.5px solid var(--hair2);border-radius:12px;background:var(--card);text-align:center;font-size:26px;font-weight:900;color:var(--ink);-webkit-text-security:disc;text-security:disc;outline:none;transition:.15s}
.pin-box.reveal{-webkit-text-security:none;text-security:none}
.pin-box:focus{border-color:var(--apri-juice);box-shadow:0 0 0 3px rgba(242,154,75,.16)}
.pin-box.on{border-color:var(--apri-juice);animation:pinpop .22s ease-out}
@keyframes pinpop{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
.lk-eye{background:none;border:none;color:var(--mute);font-size:12.5px;font-weight:700;cursor:pointer;margin-top:8px}
.lk-err{color:var(--accent);font-size:12.5px;font-weight:700;min-height:17px;margin-top:8px}
.lk-btn{width:100%;max-width:300px;margin:14px auto 0;display:block;background:linear-gradient(135deg,var(--apri-juice),var(--apri-syrup));color:#fff;border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 5px 16px rgba(242,154,75,.32);transition:.12s}
.lk-btn:active{transform:translateY(1px)}
.lk-btn.sm{padding:11px;font-size:13.5px;margin-top:11px;max-width:none;box-shadow:none}
.lk-sub{display:flex;gap:16px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.lk-link{background:none;border:none;color:var(--mute);font-size:12.5px;font-weight:700;cursor:pointer}
.lk-link:hover{color:var(--accent)}
.lk-remember{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-size:12.5px;color:var(--ink2);margin-top:15px;cursor:pointer}
.lk-remember input{width:16px;height:16px;accent-color:var(--apri-juice)}
.lk-gear{position:fixed;top:16px;right:16px;width:40px;height:40px;border-radius:50%;border:1px solid var(--hair2);background:var(--card);color:var(--mute);font-size:18px;cursor:pointer;z-index:3}
.lk-gear:hover{color:var(--accent);border-color:var(--apri-water)}
.adm-card{background:var(--card);border:1px solid var(--hair);border-radius:12px;padding:15px 14px;margin-top:14px;text-align:center}
.adm-card .lk-flabel{margin-top:0;margin-bottom:4px}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--paper);font-family:'Noto Sans KR',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
body{display:flex;justify-content:center}
#app{width:100%;max-width:440px;min-height:100vh;background:var(--paper);display:flex;flex-direction:column;position:relative;padding-bottom:104px}
.serif{font-family:'Noto Serif KR',serif}
.cormo{font-family:'Cormorant Garamond',serif}
/* ===== header ===== */
header{padding:22px 24px 0;position:sticky;top:0;z-index:30;background:var(--paper)}
.wm{display:flex;align-items:baseline;justify-content:space-between}
.wm .name{font-weight:900;font-size:17px;letter-spacing:.14em}
.wm .name b{color:var(--accent)}
.wm .est{font-size:15px;color:var(--mute);font-style:italic}
.nav{display:flex;gap:17px;margin-top:16px;border-bottom:1px solid var(--hair);overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav span{padding-bottom:11px;font-size:13px;color:var(--mute);cursor:pointer;position:relative;font-weight:500;letter-spacing:.02em;white-space:nowrap;flex:none}
.nav span.on{color:var(--ink);font-weight:700}
.nav span.on::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--ink)}
main{flex:1;padding:0 24px}
.view{display:none}.view.on{display:block;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* ===== section title (SIGNATURE 느낌) ===== */
.sec{margin:24px 0 18px}
.sec .eye{font-size:10.5px;letter-spacing:.28em;color:var(--mute);text-transform:uppercase;font-weight:600}
.sec h1{font-size:38px;font-weight:900;letter-spacing:-.015em;margin:5px 0 0;line-height:.98}
.sec .rule{height:1px;background:var(--hair2);margin-top:14px}
/* ===== generic ===== */
.row{display:flex;align-items:center;gap:8px}
.between{justify-content:space-between}
.mute{color:var(--mute)}
.eyebrow{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--mute);font-weight:600}
.card{background:var(--card);border:1px solid var(--hair);border-radius:6px;padding:18px;margin-bottom:14px}
.divider{height:1px;background:var(--hair);margin:14px 0}
.tick{display:inline-block;width:18px;height:3px;border-radius:2px;background:var(--apri-juice);margin-right:11px;vertical-align:middle}
input,select{font-family:inherit;color:var(--ink);border:none;border-bottom:1px solid var(--hair2);background:transparent;padding:8px 2px;font-size:14px;outline:none;border-radius:0}
input:focus,select:focus{border-bottom-color:var(--ink)}
input.num{text-align:right}
select{border:1px solid var(--hair2);border-radius:4px;padding:7px 8px;background:#fff}
.btn{border:none;font-family:inherit;cursor:pointer;font-weight:700;letter-spacing:.06em;font-size:13px;border-radius:4px;padding:13px 16px}
.btn.acc{background:var(--ink);color:var(--paper)}
.btn.ghost{background:transparent;border:1px solid var(--hair2);color:var(--ink)}
.btn.sm{padding:8px 12px;font-size:11px;letter-spacing:.08em}
.del{color:#C5BFB2;cursor:pointer;font-size:17px;line-height:1;padding:2px 4px}
.del:hover{color:var(--accent)}
.judge{font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:700}
.judge.ok{color:var(--mute)}.judge.bad{color:var(--accent)}
.judge .d{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:6px;vertical-align:middle;background:currentColor}
/* ===== summary ===== */
.hero{margin-bottom:22px}
.hero .big{font-size:54px;font-weight:900;letter-spacing:-.02em;line-height:1}
.hero .avg{display:flex;justify-content:space-between;font-size:12px;color:var(--mute);margin-top:14px}
.gbar{height:4px;background:var(--hair);margin-top:7px;position:relative;border-radius:3px;overflow:hidden}
.gbar > i{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--apri-water),var(--apri-juice))}
.iname{font-family:'Noto Serif KR',serif;font-weight:600;font-size:18px}
.kv{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:var(--ink2)}
.kv b{font-weight:700;color:var(--ink)}
.kv .acc{color:var(--accent)}
/* ===== menu editor ===== */
.mhead{cursor:pointer}
.mhead .sub{font-size:12px;color:var(--mute);margin-top:3px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.line{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--hair)}
.line .nm{flex:1;font-family:'Noto Serif KR',serif;font-size:14px}
.line input.use{width:54px;text-align:right}
.line .uc{font-size:10.5px;color:var(--mute);min-width:56px;text-align:right}
.line .lc{min-width:56px;text-align:right;font-weight:700;font-size:13px}
.search{position:relative;margin-top:14px}
.search input{width:100%;border:1px solid var(--hair2);border-radius:4px;padding:11px 12px;background:#fff}
.sugg{position:absolute;left:0;right:0;top:46px;background:#fff;border:1px solid var(--hair2);
  box-shadow:0 12px 28px rgba(40,35,25,.10);max-height:220px;overflow:auto;z-index:20}
.sugg div{padding:11px 13px;font-size:13.5px;border-bottom:1px solid var(--hair);cursor:pointer;display:flex;justify-content:space-between;gap:10px}
.sugg div:last-child{border-bottom:none}
.sugg div:hover{background:var(--paper2)}
.sugg .cat{color:var(--mute);font-size:11px;white-space:nowrap}
/* ===== menu showcase (grid → detail) ===== */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:2px}
.mcard{cursor:pointer;border-radius:6px}
.mcard.flash{animation:flashcard 1.3s ease-out}
@keyframes flashcard{0%,55%{box-shadow:0 0 0 3px var(--apri-juice)}100%{box-shadow:0 0 0 0 rgba(242,154,75,0)}}
.thumb{aspect-ratio:1/1;background:linear-gradient(150deg,var(--apri-bg),#FBF1E7);border:1px solid var(--hair);overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .ph{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--accent);letter-spacing:.08em;text-align:center;padding:0 10px;font-style:italic}
.mcard .nm{font-family:'Noto Serif KR',serif;font-weight:600;font-size:14px;margin-top:10px;line-height:1.3}
.mcard .pr{display:flex;justify-content:space-between;align-items:baseline;margin-top:4px}
.mcard .pr b{font-weight:700;font-size:14px}
.mcard .pr .rt{font-size:10px;color:var(--mute);letter-spacing:.04em}
/* 원가율 신호등 */
.rchip{font-size:10px;font-weight:800;padding:2px 7px;border-radius:999px;letter-spacing:.02em;white-space:nowrap}
.rchip.good{background:#E7F0DE;color:#4f6b3d}
.rchip.warn{background:#FBEFD9;color:#9a6a1e}
.rchip.bad{background:#F6E0DE;color:#9e3b34}
.mcard .margin{font-size:11px;margin-top:3px;color:var(--sage);font-weight:700}
.mcard .margin.neg{color:#9e3b34}
.mcard .pr.noprice b{color:var(--accent)}
.mcard .needprice{font-size:11px;margin-top:3px;color:var(--accent);font-weight:700}
.mcard.flag .thumb{outline:2px solid var(--accent);outline-offset:-2px}
/* 메뉴 파트 섹션 */
.msec{margin-bottom:6px}
.msec-head{display:flex;align-items:center;gap:8px;padding:11px 2px 8px;cursor:pointer;user-select:none;border-bottom:1px solid var(--hair)}
.msec-head .chev{color:var(--mute);font-size:11px;width:12px}
.msec-head .t{font-weight:800;font-size:14px;flex:1}
.msec-head .c{font-size:11px;color:var(--mute);font-weight:700}
.msec-head .bad-n{font-size:10px;font-weight:800;color:#9e3b34;background:#F6E0DE;padding:1px 7px;border-radius:999px}
.msec .grid{margin-top:12px;margin-bottom:16px}
.msec-head .menu-rename{flex:1;min-width:0;border:none;border-bottom:1.5px solid var(--apri-juice);background:none;font-weight:800;font-size:14px;padding:2px 0;outline:none;font-family:inherit}
.msec-add{font-size:17px;font-weight:700;color:var(--accent);flex:none;cursor:pointer;width:25px;height:25px;border:1px solid var(--apri-water);border-radius:50%;display:flex;align-items:center;justify-content:center;line-height:1}
.msec-add:active{background:var(--apri-bg);transform:scale(.9)}
.msec-edit{font-size:13px;flex:none;opacity:.4;filter:grayscale(1);cursor:pointer}
.msec-edit.on{opacity:1;filter:none}
.msec-del{color:#C5BFB2;font-size:18px;flex:none;padding:0 2px;line-height:1;cursor:pointer}
/* 입력 유도 배너 */
.mwarn{display:flex;gap:10px;align-items:center;background:linear-gradient(135deg,#FBEEDF,#F8E6D2);border:1px solid var(--apri-water);border-radius:12px;padding:11px 13px;margin-bottom:14px;font-size:12.5px;font-weight:700;color:var(--ink2);cursor:pointer}
.mwarn b{color:var(--accent)}
.field input.empty-glow,.field select.empty-glow{border-color:var(--apri-juice);box-shadow:0 0 0 3px rgba(242,154,75,.14)}
.back{font-size:12px;color:var(--mute);letter-spacing:.12em;cursor:pointer;display:inline-block;margin:4px 0 14px}
.back:hover{color:var(--ink)}
.heroimg{aspect-ratio:4/3;background:linear-gradient(150deg,var(--apri-bg),#FBF1E7);border:1px solid var(--hair);overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:16px;position:relative}
.heroimg img{width:100%;height:100%;object-fit:cover}
.heroimg .add{font-family:'Cormorant Garamond',serif;color:var(--mute);font-size:16px;letter-spacing:.06em;font-style:italic}
.heroimg .edit{position:absolute;right:10px;bottom:10px;background:rgba(26,24,21,.78);color:var(--paper);font-size:10px;letter-spacing:.1em;padding:5px 9px;border-radius:3px}
.dname{font-family:'Noto Serif KR',serif;font-weight:700;font-size:25px;line-height:1.25}
.dprice{font-size:15px;font-weight:700;margin-top:4px}
textarea{font-family:inherit;color:var(--ink);border:1px solid var(--hair2);border-radius:4px;background:#fff;padding:11px 12px;font-size:13.5px;width:100%;resize:vertical;line-height:1.7;outline:none}
textarea:focus{border-color:var(--ink)}
/* ===== 브랜드 요정 + 살구 스와치 + 인트로 ===== */
.brandrow{display:flex;align-items:center;gap:9px}
.fairy-h{width:26px;height:34px;cursor:pointer;flex:none}
.fairy-h svg{width:100%;height:100%;display:block}
.swatches{display:flex;gap:5px;align-items:center;margin-top:9px}
.swatches i{width:13px;height:13px;border-radius:50%;display:block;box-shadow:0 1px 2px rgba(120,80,40,.18)}
.sw1{background:var(--apri-water)}.sw2{background:var(--apri-juice)}.sw3{background:var(--apri-syrup)}
.swatches span{font-size:9.5px;letter-spacing:.16em;color:var(--mute);text-transform:uppercase;margin-left:3px}
#intro{position:fixed;inset:0;z-index:999;
  background:radial-gradient(120% 80% at 50% 38%,#FFFDFA 0%,var(--paper) 72%);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:4px;overflow:hidden}
#intro.show{display:flex}
#intro.gone{opacity:0;transform:translateY(-18px);transition:opacity .6s ease,transform .6s ease;pointer-events:none}
.intro-fairy{width:160px;height:212px;animation:flyIn 1.15s cubic-bezier(.18,.7,.2,1) both}
.intro-fairy .bob{display:block;width:100%;height:100%;animation:bob 2.6s ease-in-out 1.15s infinite;transform-origin:50% 60%}
.intro-fairy svg{width:100%;height:100%;display:block;overflow:visible}
@keyframes flyIn{0%{transform:translate(-160px,180px) rotate(-16deg) scale(.6);opacity:0}55%{opacity:1}100%{transform:translate(0,0) rotate(0) scale(1);opacity:1}}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-12px) rotate(2deg)}}
.wstar{transform-box:fill-box;transform-origin:center;animation:tw .9s ease-in-out 1s 3}
@keyframes tw{0%,100%{transform:scale(1) rotate(0)}50%{transform:scale(1.4) rotate(28deg)}}
.intro-word{font-weight:900;letter-spacing:.2em;font-size:21px;color:var(--ink);opacity:0;animation:fadeUp .7s ease 1.1s forwards}
.intro-word b{color:var(--accent)}
.intro-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:var(--mute);opacity:0;animation:fadeUp .7s ease 1.35s forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.spkfield{position:absolute;top:32%;left:50%;width:0;height:0}
.spk{position:absolute;width:9px;height:9px;border-radius:50%;opacity:0}
.spk.go{animation:spk 1.05s ease-out forwards}
@keyframes spk{0%{opacity:0;transform:translate(0,0) scale(.2)}25%{opacity:1}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1)}}
/* ===== pantry ===== */
.cathead{font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:var(--ink);margin:10px 0 8px;
  display:flex;align-items:center;justify-content:space-between;cursor:pointer;
  background:var(--card);border:1px solid var(--hair);border-radius:6px;padding:13px 15px}
.cathead .catn{color:var(--accent);font-weight:700;margin-left:6px}
.cathead .chev{font-size:16px;color:var(--mute);font-weight:400}
.cathead .catdel{font-size:10px;letter-spacing:.06em;color:#C5BFB2;font-weight:600}
.cathead .catdel:hover{color:var(--accent)}
.cathead.on{border-color:var(--hair2)}
.matrow{display:grid;grid-template-columns:1fr 64px 54px 52px 24px;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid var(--hair)}
.matrow input{font-size:13px}
.matrow .unitc{font-size:11px;color:var(--accent);text-align:right;font-weight:700}
.matlabel{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute)}
.sheetwrap{overflow-x:auto;border:1px solid var(--hair);border-radius:8px;background:var(--card);-webkit-overflow-scrolling:touch}
.sheet{border-collapse:collapse;min-width:580px;width:100%;font-size:12.5px}
.sheet th{background:var(--ink);color:var(--paper);font-weight:700;font-size:11px;letter-spacing:.03em;padding:9px 8px;position:sticky;top:0;white-space:nowrap;text-align:left}
.sheet td{border-bottom:1px solid var(--hair);border-right:1px solid var(--hair);padding:0}
.sheet td input,.sheet td select{border:none;background:transparent;width:100%;padding:8px;font-size:12.5px;border-radius:0;color:var(--ink)}
.sheet td input:focus{background:#FFF;outline:2px solid var(--apri-juice);outline-offset:-2px}
.sheet td.uc{padding:8px;text-align:right;color:var(--accent);font-weight:700;white-space:nowrap}
.sheet tr.hl-core{background:#FBE1DF}.sheet tr.hl-often{background:#FBE7D6}.sheet tr.hl-mid{background:#FBF4D9}.sheet tr.hl-rare{background:#F0EEE9}
.sheet td.hlcell{text-align:center;cursor:pointer;width:30px}
.sheet td.delcell{text-align:center;cursor:pointer;font-size:15px;width:28px}
.hldot{width:13px;height:13px;border-radius:50%;display:inline-block;border:1px solid var(--hair2);vertical-align:middle}
.strow{display:grid;grid-template-columns:1fr 62px 56px 54px;gap:7px;align-items:center;padding:9px 0;border-bottom:1px solid var(--hair)}
.strow .stn{font-family:'Noto Serif KR',serif;font-size:13px;line-height:1.35}
.strow .cons{font-size:10px;color:var(--mute);font-family:'Noto Sans KR',sans-serif}
.strow input{border:1px solid var(--hair2);border-radius:7px;padding:7px;font-size:12.5px;text-align:right;background:#fff}
.strow input:focus{border-color:var(--apri-juice)}
.strow.low{background:linear-gradient(90deg,transparent,rgba(201,116,46,.07))}
/* 전체화면 시트 */
#sheetfs{position:fixed;inset:0;z-index:600;background:var(--paper);display:none;flex-direction:column}
#sheetfs.show{display:flex}
.fs-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 14px;border-bottom:1px solid var(--hair2);background:var(--card);flex-wrap:wrap}
.fs-title{font-weight:900;font-size:15px}
.fs-bar input{border:1px solid var(--hair2);border-radius:8px;padding:8px 11px;font-size:13px;width:130px;background:#fff}
.fs-body{flex:1;overflow:auto}
#sheetfs .sheet{min-width:100%}
#sheetfs .sheet td input,#sheetfs .sheet td select{padding:11px 10px;font-size:13px}
.sheetfs-open{font-size:11px;letter-spacing:.04em}
/* ===== 운영(매출·지출·손익) ===== */
.daynav,.monthnav{display:flex;align-items:center;justify-content:space-between;margin:0 0 14px;gap:10px}
.daynav b,.monthnav b{font-size:16px;font-weight:700;flex:1;text-align:center}
.navbtn{border:1px solid var(--hair2);background:#fff;border-radius:9px;width:36px;height:36px;font-size:17px;cursor:pointer;color:var(--ink);flex:none}
.srow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--hair)}
.srow.has{background:linear-gradient(90deg,transparent,rgba(242,154,75,.06))}
.srow .snm{flex:1;font-family:'Noto Serif KR',serif;font-size:14px}
.srow .sp{font-size:10.5px;color:var(--mute);min-width:48px;text-align:right}
.stepper{display:flex;align-items:center;border:1px solid var(--hair2);border-radius:9px;overflow:hidden}
.stepper button{width:32px;height:32px;border:none;background:#fff;font-size:17px;cursor:pointer;color:var(--ink);line-height:1}
.stepper button.plus{background:var(--apri-juice);color:#fff}
.stepper .q{min-width:30px;text-align:center;font-weight:700;font-size:14px}
.stepper input.q{width:44px;height:32px;text-align:center;font-weight:700;font-size:14px;padding:0;border:none;border-left:1px solid var(--hair2);border-right:1px solid var(--hair2);border-radius:0;background:#fff}
.stepper input.q:focus{border-left-color:var(--apri-juice);border-right-color:var(--apri-juice)}
.navbtn.sm2{width:28px;height:28px;font-size:14px;border-radius:7px}
.cal{background:var(--card);border:1px solid var(--hair);border-radius:10px;padding:12px 14px}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-head b{font-size:13px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-w{font-size:10px;color:var(--mute);text-align:center;padding:3px 0}
.cal-w.sun{color:#C0635A}.cal-w.sat{color:#6E86A8}
.cal-d{position:relative;text-align:center;font-size:12px;padding:7px 0;border-radius:7px;cursor:pointer;color:var(--ink2)}
.cal-d.empty{cursor:default}
.cal-d.today{color:var(--accent);font-weight:700}
.cal-d.sel{background:var(--ink);color:#fff;font-weight:700}
.cal-d .cd{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--apri-juice)}
.cal-d .cd.reg{background:var(--sage)}
.cal-d.sel .cd{background:#fff}
.cal-d .cm{position:absolute;top:4px;right:5px;width:4px;height:4px;border-radius:50%;background:var(--mute)}
.daysum,.threebox{display:flex;gap:8px;margin-top:16px}
.daysum .box,.threebox .box{flex:1;background:var(--card);border:1px solid var(--hair);border-radius:9px;padding:13px 8px;text-align:center}
.box .v{font-size:17px;font-weight:900;margin-top:4px}.box .v.acc{color:var(--accent)}
.box .l{font-size:10px;color:var(--mute);letter-spacing:.06em}
.pl{background:var(--card);border:1px solid var(--hair);border-radius:9px;padding:16px 18px;margin-bottom:14px}
.plrow{display:flex;justify-content:space-between;align-items:baseline;font-size:14px;padding:8px 0}
.plrow.tot{border-top:1px solid var(--hair2);margin-top:5px;padding-top:12px}
.plrow .lab{color:var(--ink2)}.plrow .lab .pct{font-size:11px;color:var(--mute);margin-left:7px}
.plrow b{font-weight:700}.plrow b.acc{color:var(--accent)}.plrow b.big{font-size:19px;font-weight:900}
.gauge{height:8px;background:var(--hair);border-radius:5px;overflow:hidden;margin-top:7px}
.gauge>i{display:block;height:100%;background:linear-gradient(90deg,var(--apri-water),var(--apri-juice))}
.rank{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--hair)}
.rank:last-child{border-bottom:none}
.rank .n{width:16px;color:var(--accent);font-weight:900;font-size:13px}
.rank .rn{flex:1;font-family:'Noto Serif KR',serif;font-size:13.5px}
.rank .rsub{font-size:10.5px;color:var(--mute)}
.rank .rv{font-weight:700;font-size:13px;text-align:right}
.exprow{display:flex;gap:6px;align-items:center;padding:6px 0}
.exprow input{min-width:0}
.exprow input.en{flex:1 1 0}.exprow input.ea{flex:none;width:78px;text-align:right}
.preset{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 2px}
.chip{border:1px solid var(--hair2);border-radius:999px;padding:7px 12px;font-size:11px;cursor:pointer;background:#fff;color:var(--ink2)}
.chip:active{background:var(--apri-bg)}
/* ===== 발주 ===== */
.prodrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--hair)}
.prodrow .pn{flex:1;font-family:'Noto Serif KR',serif;font-size:13.5px}
.prodrow .pcost{font-size:10.5px;color:var(--mute);min-width:64px;text-align:right}
.prodrow input{width:54px;text-align:center;border:1px solid var(--hair2);border-radius:8px;padding:8px;font-size:14px;font-weight:700}
.sup-card{background:var(--card);border:1px solid var(--hair);border-radius:9px;padding:14px 16px;margin-bottom:12px}
.sup-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:10px}
.sup-head .sname{font-weight:700;font-size:14px}
.sup-head .sname b{color:var(--accent)}
.linkbtn{font-size:11px;color:#fff;background:var(--apri-juice);border-radius:7px;padding:7px 12px;text-decoration:none;letter-spacing:.03em;white-space:nowrap}
.linkbtn.off{background:var(--hair);color:var(--mute);pointer-events:none}
.oitem{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;padding:7px 0;border-bottom:1px solid var(--hair)}
.oitem:last-child{border-bottom:none}
.oitem .oq{color:var(--accent);font-weight:700}
.oitem .oamt{color:var(--mute);font-size:11px;margin-left:8px}
.sup-sub{display:flex;justify-content:space-between;font-size:12px;font-weight:700;padding-top:9px;margin-top:3px;border-top:1px solid var(--hair2)}
.supset{display:flex;gap:7px;align-items:center;padding:8px 0;border-bottom:1px solid var(--hair)}
.supset .sn{flex:1;font-size:13px;font-family:'Noto Serif KR',serif;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.supset input{border:1px solid var(--hair2);border-radius:7px;padding:8px;font-size:12px;background:#fff}
.supset input.sup{width:78px}.supset input.lnk{width:84px}
.ordrow{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--hair)}
.ordrow.on{background:linear-gradient(90deg,transparent,rgba(242,154,75,.06))}
.ordrow .ordnm{flex:1;font-family:'Noto Serif KR',serif;font-size:13.5px;line-height:1.35;min-width:0}
.ordrow .ordhint{font-size:10px;color:var(--mute);font-family:'Noto Sans KR',sans-serif}
.ordrow .ordhint.lowt{color:var(--accent);font-weight:700}
.ordrow .ordamt{min-width:58px;text-align:right;font-size:12px;font-weight:700;color:var(--accent)}
.ordrow .ipx{width:52px;border:none;border-bottom:1px solid var(--hair2);background:transparent;font-size:10.5px;text-align:right;padding:1px 2px;color:var(--ink);font-weight:700}
.ordrow .ipx:focus{border-bottom-color:var(--apri-juice)}
.ordfoot select,.sup-card select{border:1px solid var(--hair2);border-radius:7px;padding:7px 8px;background:#fff;font-size:12px;width:100%}
/* 발주처 명함 헤더 */
.ord-card{background:linear-gradient(135deg,#FFFDFA,#FBF3EA);border:1px solid var(--apri-water);border-radius:12px;padding:14px 15px}
.ord-name{width:100%;border:none;background:none;font-size:19px;font-weight:900;color:var(--ink);padding:0 0 9px;border-bottom:1.5px solid var(--apri-juice);outline:none;font-family:inherit}
.ord-name::placeholder{color:var(--mute);font-weight:700;font-size:16px}
.ord-contact{display:flex;align-items:center;gap:9px;margin-top:10px}
.ord-cic{font-size:13px;width:18px;text-align:center;flex:none}
.ord-cin{flex:1;min-width:0;border:none;background:none;border-bottom:1px solid var(--hair);font-size:13px;padding:4px 0;outline:none;color:var(--ink2);font-family:inherit}
.ord-cin:focus{border-bottom-color:var(--apri-juice);color:var(--ink)}
/* ===== fab / toast ===== */
.fab{position:fixed;max-width:440px;width:100%;bottom:62px;left:50%;transform:translateX(-50%);
  padding:14px 24px 14px;background:linear-gradient(0deg,var(--paper) 62%,rgba(243,241,234,0));pointer-events:none;z-index:55}
.fab .btn{width:100%;pointer-events:auto}
.toast{position:fixed;bottom:124px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);
  padding:11px 18px;font-size:12px;letter-spacing:.04em;opacity:0;transition:.25s;z-index:70;pointer-events:none;border-radius:3px}
.toast.show{opacity:1}
/* ===== 하단 워크스페이스 바 ===== */
.wsnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;height:60px;background:rgba(251,250,246,.97);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid var(--hair);display:flex;z-index:60}
.wsnav button{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--mute);padding:0;position:relative;font-family:inherit}
.wsnav button i{font-size:19px;line-height:1;font-style:normal;filter:grayscale(.45) opacity(.65);transition:.15s}
.wsnav button span{font-size:10px;font-weight:700;letter-spacing:-.01em}
.wsnav button.on{color:var(--ink)}
.wsnav button.on i{filter:none}
.wsnav button.on::after{content:'';position:absolute;top:0;left:24%;right:24%;height:2.5px;border-radius:0 0 3px 3px;background:var(--apri-juice)}
.wsnav button:active{transform:scale(.93)}
.gear{border:1px solid var(--hair2);background:var(--card);color:var(--mute);width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;flex:none;line-height:1}
.gear:hover,.gear.on{color:var(--accent);border-color:var(--apri-water)}
.star{border:1px solid var(--hair2);background:var(--card);width:34px;height:34px;border-radius:50%;font-size:15px;cursor:pointer;flex:none;line-height:1;filter:grayscale(.5);opacity:.7}
.star:hover{filter:none;opacity:1;border-color:var(--apri-water)}
.star.owner{filter:none;opacity:1;background:linear-gradient(135deg,var(--apri-juice),var(--apri-syrup));border-color:var(--apri-juice);box-shadow:0 2px 8px rgba(242,154,75,.35)}
.staff-board .sb-hi{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;margin:2px 0 2px}
.role-pill{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.03em;padding:2px 9px;border-radius:999px;background:var(--paper2);color:var(--mute);margin-left:7px;vertical-align:middle}
.role-pill.owner{background:linear-gradient(135deg,#F4D06A,#E0A93C);color:#5a4410}
.cm-toggle{display:flex;align-items:center;gap:9px;padding:8px 0;font-size:13px;font-weight:600;color:var(--ink2);cursor:pointer}
.cm-toggle input{width:18px;height:18px;accent-color:var(--apri-juice);flex:none}
/* 체크리스트 / 인수인계 */
.chk-sec{margin-top:4px}
.chk-h{font-size:12px;font-weight:800;color:var(--ink2);margin:9px 0 1px}
.chk-item{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:13.5px}
.chk-item input[type=checkbox]{width:19px;height:19px;accent-color:var(--apri-juice);flex:none}
.chk-tx{flex:1;min-width:0;border:none;font-size:13.5px;padding:3px 0;outline:none;background:none;color:var(--ink);font-family:inherit;border-bottom:1px solid transparent}
.chk-tx:focus{border-bottom-color:var(--apri-juice)}
.chk-item.done .chk-tx{color:var(--mute);text-decoration:line-through}
.chk-pin{font-size:13px;flex:none;cursor:pointer;filter:grayscale(1);opacity:.3;width:22px;text-align:center}
.chk-pin.on{filter:none;opacity:1}
.chk-pin:active{transform:scale(.85)}
.ho-list{display:flex;flex-direction:column;gap:8px;margin-bottom:11px}
.ho-item{display:flex;align-items:center;gap:9px;font-size:13px}
.ho-by{font-size:14px;flex:none}
.ho-tx{flex:1;min-width:0;font-weight:600}
.ho-meta{font-size:10px;color:var(--mute);flex:none}
.ho-add{display:flex;gap:7px}
.ho-add input{flex:1;min-width:0;border:1px solid var(--hair2);border-radius:8px;padding:9px 10px;font-size:13px}
.ho-add input:focus{border-color:var(--apri-juice);outline:none}
/* 매출 파트(카테고리) 접기/펼치기 */
.scat-wrap{margin-bottom:8px}
.scat{display:flex;align-items:center;gap:8px;padding:12px 14px;background:var(--card);border:1px solid var(--hair);border-radius:11px;cursor:pointer;user-select:none}
.scat.open{border-color:var(--apri-water);border-bottom-left-radius:0;border-bottom-right-radius:0}
.scat-chev{color:var(--mute);font-size:11px;width:12px;flex:none;text-align:center}
.scat-name{font-weight:800;font-size:14.5px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
input.scat-name{border:none;border-bottom:1.5px solid var(--apri-juice);background:none;padding:2px 0;outline:none}
.scat-n{font-size:11px;color:var(--accent);font-weight:800;flex:none}
.scat-edit{font-size:13px;flex:none;opacity:.45;filter:grayscale(1);transition:.12s}
.scat-edit.on{opacity:1;filter:none}
.scat-edit:active{transform:scale(.85)}
.scat-del{color:#C5BFB2;font-size:17px;flex:none;padding:0 2px;line-height:1}
.scat-body{background:var(--card);border:1px solid var(--apri-water);border-top:none;border-radius:0 0 11px 11px;padding:4px 14px 12px;margin-top:-1px}
.scat-body .srow:last-of-type{border-bottom:none}
.sp-in{width:60px;flex:none;font-size:11px;color:var(--mute);border:none;border-bottom:1px solid transparent;text-align:right;background:none;padding:3px 0}
.sp-in:focus{border-bottom-color:var(--apri-juice);color:var(--ink);outline:none}
.snm-in{flex:1;min-width:0;border:none;border-bottom:1.5px solid var(--apri-juice);background:none;font-size:14px;font-weight:700;padding:3px 0;outline:none;font-family:'Noto Serif KR',serif}
/* 우선순위 선택 팝오버 */
.prio-pop{position:fixed;z-index:1000;background:#fff;border:1px solid var(--hair2);border-radius:11px;box-shadow:0 8px 24px rgba(60,40,20,.2);padding:5px;min-width:138px}
.prio-opt{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13.5px;font-weight:700;color:var(--ink)}
.prio-opt:active,.prio-opt.on{background:var(--apri-bg)}
.prio-opt i{width:13px;height:13px;border-radius:50%;flex:none;border:1px solid var(--hair2)}
/* 우선순위 범례 */
.prio-legend{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--ink2);font-weight:700;margin:0 0 10px;padding:8px 11px;background:var(--card);border:1px solid var(--hair);border-radius:9px}
.prio-legend>span{display:flex;align-items:center;gap:5px}
.prio-legend i{width:11px;height:11px;border-radius:50%;display:inline-block;flex:none}
.fs-legend{padding:8px 16px 0}
/* 장바구니 카드 */
.cartbox{background:linear-gradient(135deg,#FBEEDF,#F8E6D2);border:1px solid var(--apri-water);border-radius:14px;padding:14px 15px}
.cartbox.empty{background:var(--card);border:1px dashed var(--hair2)}
.cartbox-head{display:flex;align-items:center;gap:9px}
.cartbox-t{font-weight:900;font-size:15px}
.cartbox-n{font-size:11px;font-weight:800;color:#fff;background:var(--apri-juice);border-radius:999px;padding:2px 10px}
.cartbox-empty{font-size:12.5px;color:var(--mute);margin-top:9px}
.cartchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.cartchip{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--apri-water);border-radius:999px;padding:5px 8px 5px 11px;font-size:12px;font-weight:700;color:var(--ink)}
.cartchip b{color:#C5BFB2;cursor:pointer;font-size:15px;line-height:1}
.cartchip b:active{color:var(--accent)}
.buyrow .incart-tag{font-size:9.5px;font-weight:800;color:var(--accent);margin-left:6px}
.buyrow.incart{opacity:.9}
/* 발주 체크리스트 (살 것) */
.buyrow{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--hair);cursor:pointer}
.buyrow .bchk{width:22px;height:22px;border:1.5px solid var(--hair2);border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:900}
.buyrow.on{background:linear-gradient(90deg,rgba(242,154,75,.09),transparent)}
.buyrow.on .bchk{background:var(--apri-juice);border-color:var(--apri-juice)}
.buyrow .bn{font-family:'Noto Serif KR',serif;font-size:14px;display:flex;flex-direction:column;gap:1px;min-width:0}
.buyrow .bsub{font-family:'Noto Sans KR',sans-serif;font-size:10.5px;color:var(--mute);font-weight:400}
.buyrow:active{background:rgba(242,154,75,.06)}
/* 핀(매달 고정) 토글 */
.pin{cursor:pointer;font-size:13px;width:22px;text-align:center;flex:none;filter:grayscale(1);opacity:.3;transition:.12s;user-select:none}
.pin.on{filter:none;opacity:1}
.pin:active{transform:scale(.85)}
/* ===== 세그먼트(하위 탭) ===== */
.seg{display:flex;gap:6px;background:var(--paper2);border:1px solid var(--hair);border-radius:11px;padding:4px;margin:18px 0 2px}
.seg button{flex:1;border:none;background:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;color:var(--mute);cursor:pointer;transition:.12s;font-family:inherit}
.seg button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 3px rgba(120,80,40,.12)}
.empty{text-align:center;color:var(--mute);font-size:13px;padding:30px 0}
/* ===== 요정 리마인더 ===== */

function dayCogs(d){return Object.entries(daySales(d)).reduce((s,[id,q])=>{const m=menuById(id);return s+(m?pieceCost(m)*q:0);},0);}
function monthDays(m){return [...new Set([...Object.keys(S.sales),...Object.keys(S.extra),...Object.keys(S.dexp)])].filter(d=>d.startsWith(m));}

function salesRow(mn,d,edit){
  const qy=daySales(d)[mn.id]||0;
  return `<div class="srow${qy?' has':''}">
    ${edit?`<input class="snm snm-in" data-mname="${mn.id}" value="${esc(mn.name)}" placeholder="메뉴 이름">`:`<span class="snm">${esc(mn.name)||'<span class=mute>이름 미정</span>'}</span>`}

    <span class="stepper"><button data-sdec="${mn.id}">−</button><input class="q num" type="number" data-sqty="${mn.id}" value="${qy||''}" placeholder="0"><button class="plus" data-sinc="${mn.id}">＋</button></span>
    ${edit?`<span class="del" data-delmenu2="${mn.id}">×</span>`:''}</div>`;

function renderSalesGroups(el,d){
  const cats=[...S.menuCats], vis=S.menus.filter(mn=>!mn.hidden);
  const orphan=vis.filter(mn=>!cats.includes(mn.mcat||''));
  const groups=cats.map(c=>({cat:c,menus:vis.filter(mn=>(mn.mcat||'')===c)}));
  if(orphan.length)groups.push({cat:'미분류',menus:orphan,orphan:true});
  const wrap=document.createElement('div');
  groups.forEach(g=>{
    const isDef=DEFAULT_MCATS.includes(g.cat), open=!!S.salesOpen[g.cat], edit=salesEdit.has(g.cat);
    const todayN=g.menus.reduce((s,mn)=>s+(daySales(d)[mn.id]||0),0);
    let h=`<div class="scat${open?' open':''}" data-salescat="${esc(g.cat)}">
      <span class="scat-chev">${open?'▾':'▸'}</span>
      ${(edit&&!isDef&&!g.orphan)?`<input class="scat-name scat-rename" data-catrename="${esc(g.cat)}" value="${esc(g.cat)}">`:`<span class="scat-name">${esc(g.cat)}</span>`}
      <span class="scat-n">${todayN?todayN+'개':'·'}</span>
      <span class="scat-edit${edit?' on':''}" data-editcat="${esc(g.cat)}" title="메뉴 추가·삭제">✏️</span>
      ${(!isDef&&!g.orphan)?`<span class="scat-del" data-delcat2="${esc(g.cat)}" title="파트 삭제">×</span>`:''}
    </div>`;
    if(open){
      h+=`<div class="scat-body">`;
      if(!g.menus.length)h+=`<div class="muted" style="font-size:12px;padding:8px 2px">메뉴가 없어요 · 아래 ＋ 로 추가하세요</div>`;
      g.menus.forEach(mn=>h+=salesRow(mn,d,edit));
      if(!g.orphan)h+=`<button class="btn ghost sm" data-addmenucat="${esc(g.cat)}" style="width:100%;margin-top:8px">＋ ${esc(g.cat)} 메뉴 추가</button>`;
      h+=`</div>`;
    }

let cur='summary';
let prodSeg='menu';
let role=sessionStorage.getItem('apri_role')==='owner'?'owner':'staff';
function isOwner(){return role==='owner';}
const OWNER_ONLY=['expenses']; // 직원이 못 가는 워크스페이스
function applyRole(){
  const ob=document.getElementById('ownerBtn');
  if(ob){ob.textContent=isOwner()?'🔑':'⭐';ob.classList.toggle('owner',isOwner());ob.title=isOwner()?'마스터 모드 (눌러서 일반 모드로)':'마스터 모드 들어가기';}
  document.querySelectorAll('.wsnav [data-ws]').forEach(b=>{b.style.display=(!isOwner()&&OWNER_ONLY.includes(b.dataset.ws))?'none':'';});
  if(!isOwner()&&OWNER_ONLY.includes(cur))cur='summary';
}
function render(){
  applyRole();
  document.querySelectorAll('.wsnav [data-ws]').forEach(t=>t.classList.toggle('on',t.dataset.ws===cur));
  document.getElementById('gearBtn').classList.toggle('on',cur==='set');
  document.querySelectorAll('main > .view').forEach(v=>v.classList.toggle('on',v.id==='v-'+cur));
  ({summary:renderSummary,sales:renderSales,expenses:renderExpenses,product:renderProduct,order:renderOrder,set:renderSet}[cur]||renderSummary)();
  renderFab();
}
function renderProduct(){
  document.querySelectorAll('#prodSeg [data-seg]').forEach(b=>b.classList.toggle('on',b.dataset.seg===prodSeg));
  document.getElementById('v-menu').style.display=prodSeg==='menu'?'':'none';
  document.getElementById('v-mat').style.display=prodSeg==='mat'?'':'none';
  if(prodSeg==='menu')renderMenu(); else renderMat();
}
function renderFab(){
  const f=document.getElementById('fab');
  if(cur==='product'&&prodSeg==='menu'&&!openMenu)f.innerHTML=`<button class="btn acc" id="addMenu">＋  새 메뉴 추가</button>`;
  else f.innerHTML='';
}

/* image upload (resize → jpeg, localStorage 절약) */
function resizeImg(file,cb){const fr=new FileReader();fr.onload=()=>{const img=new Image();img.onload=()=>{
  const max=1000;let w=img.width,h=img.height;
  if(w>h&&w>max){h=Math.round(h*max/w);w=max;}else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;}
  const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
  cb(cv.toDataURL('image/jpeg',0.82));};img.src=fr.result;};fr.readAsDataURL(file);}

  if(t.dataset.chktext){const[k,id]=t.dataset.chktext.split('|');const it=(S.checklist[k]||[]).find(x=>x.id===id);if(it){it.text=t.value;save();}return;}
  if(t.id==='tgBest'){S.staffShowBest=t.checked;save();toast(t.checked?'직원에게 베스트셀러 공개':'베스트셀러 숨김');return;}
  if(t.id==='tgGoal'){S.staffShowGoal=t.checked;save();toast(t.checked?'직원에게 매출 목표 공개':'매출 목표 숨김');return;}
  if(t.id==='orderDow'){S.orderDow=t.value;save();return;}
  if(t.dataset.assign){const gid=t.value,iid=t.dataset.assign;if(gid){const g=S.orderGroups.find(x=>x.id===gid);if(g&&!g.ingIds.includes(iid)){g.ingIds.push(iid);save();renderOrder();toast('묶음으로 옮김');}}return;}
  if(!t.dataset.imgup)return;
  const f=t.files&&t.files[0];if(!f)return;
  resizeImg(f,url=>{const m=S.menus.find(x=>x.id===t.dataset.imgup);const prev=m.img;m.img=url;
    try{save();}catch(err){m.img=prev;alert('사진 용량이 너무 큽니다. 더 작은 이미지를 사용해주세요.');return;}
    renderMenu();toast('사진 추가됨');});});

/* ===== 브랜드 요정 + 인트로 애니메이션 ===== */

(function(){const h=document.getElementById('fairy-h'),i=document.getElementById('intro-fairy');if(h)h.innerHTML=FAIRY;if(i)i.innerHTML=FAIRY;})();
// sparkles
(function(){const f=document.getElementById('spkfield');if(!f)return;
  const cols=['#F4C9A6','#F29A4B','#EAA468','#F4C9A6','#F29A4B','#EAA468','#F8D9BE'];
  const pos=[[36,-46],[70,-10],[58,40],[-30,-40],[-58,6],[-44,46],[14,64]];
  f.innerHTML=cols.map((c,n)=>`<i class="spk" style="background:${c};--dx:${pos[n][0]}px;--dy:${pos[n][1]}px;left:0;top:0"></i>`).join('');})();
function runIntro(force){
  const ov=document.getElementById('intro');if(!ov)return;
  if(!force && sessionStorage.getItem('apri_intro'))return;
  sessionStorage.setItem('apri_intro','1');
  ov.classList.remove('gone');ov.classList.add('show');
  ov.querySelectorAll('.intro-fairy,.intro-word,.intro-sub').forEach(e=>{e.style.animation='none';e.offsetHeight;e.style.animation='';});
  ov.querySelectorAll('.spk').forEach(s=>s.classList.remove('go'));
  setTimeout(()=>ov.querySelectorAll('.spk').forEach((s,n)=>setTimeout(()=>s.classList.add('go'),n*85)),980);
  const done=()=>{ov.classList.add('gone');setTimeout(()=>{ov.classList.remove('show','gone');},650);};
  clearTimeout(ov._t);ov._t=setTimeout(done,2700);
  ov.onclick=()=>{clearTimeout(ov._t);done();};
}
const fh=document.getElementById('fairy-h');if(fh)fh.onclick=()=>runIntro(true);

/* ===== 로그인 / 관리자 (이 기기 로컬 잠금) ===== */
const A_PIN='apripoco_pin', A_ADMIN='apripoco_adminpin', A_REMEMBER='apripoco_authed';
function aHash(s){let x=5381;s=String(s);for(let i=0;i<s.length;i++)x=((x<<5)+x+s.charCodeAt(i))>>>0;return 'h'+x.toString(36);}
function pinSet(){return !!localStorage.getItem(A_PIN);}
function setPin(p){localStorage.setItem(A_PIN,aHash(p));}
function pinMatches(p){return pinSet()&&localStorage.getItem(A_PIN)===aHash(p);}
function adminMatches(p){const s=localStorage.getItem(A_ADMIN);return s?s===aHash(p):p==='1134';}
function isAuthed(){return sessionStorage.getItem('apri_sess')==='1'||localStorage.getItem(A_REMEMBER)==='1';}
function pinVal(pg){return [...document.querySelectorAll('.pin-row[data-pg="'+pg+'"] .pin-box')].map(b=>b.value).join('');}
function pinRow(pg){return '<div class="pin-row" data-pg="'+pg+'">'+[0,1,2,3].map(i=>'<input class="pin-box" inputmode="numeric" autocomplete="off" maxlength="1" data-i="'+i+'">').join('')+'</div>';}
let _lockMode='login';
function enterApp(){sessionStorage.setItem('apri_sess','1');const ov=document.getElementById('lk-ov');if(ov)ov.classList.remove('show');runIntro(false);}
function showLock(mode){_lockMode=mode||(pinSet()?'login':'setup');const ov=document.getElementById('lk-ov');if(ov)ov.classList.add('show');renderLock();}
function lockNow(){sessionStorage.removeItem('apri_sess');localStorage.removeItem(A_REMEMBER);showLock(pinSet()?'login':'setup');}
function renderLock(){
  const c=document.getElementById('lk-card');if(!c)return;
  const head='<button class="lk-gear" data-lk="to-admin" title="관리자 페이지">⚙</button>'
    +'<div class="lk-fairy" id="lk-fairy"></div>'
    +'<div class="lk-word">APRI POCO<b>.</b></div><div class="lk-est">est 2026</div>';
  let body='';
  if(_lockMode==='setup'){
    body='<div class="lk-title">비밀번호 설정</div>'
      +'<div class="lk-desc">처음 오셨네요 🧚<br>매장 비밀번호(숫자 4자리)를 정해주세요.</div>'
      +'<div class="lk-flabel">새 비밀번호</div>'+pinRow('a')
      +'<div class="lk-flabel">한 번 더</div>'+pinRow('b')
      +'<button class="lk-eye" data-lk="eye">👁 숫자 보기</button>'
      +'<div class="lk-err" id="lk-err"></div>'
      +'<button class="lk-btn" data-lk="setup-go">설정하고 입장 →</button>';
  } else if(_lockMode==='login'){
    body='<div class="lk-title">어서오세요</div>'
      +'<div class="lk-desc">매장 비밀번호를 입력해주세요.</div>'
      +pinRow('a')
      +'<button class="lk-eye" data-lk="eye">👁 숫자 보기</button>'
      +'<div class="lk-err" id="lk-err"></div>'
      +'<button class="lk-btn" data-lk="login-go">입장하기 →</button>'
      +'<label class="lk-remember"><input type="checkbox" id="lk-remember" checked> 이 기기 기억 · 다음엔 바로 입장</label>'
      +'<div class="lk-sub"><button class="lk-link" data-lk="to-admin">비밀번호를 잊으셨나요?</button></div>';
  } else if(_lockMode==='owner'){
    body='<div class="lk-title">🔑 마스터 모드</div>'
      +'<div class="lk-desc">마스터 비밀번호를 입력하면<br>매출·지출·손익 등 전체가 열려요.</div>'
      +pinRow('a')
      +'<button class="lk-eye" data-lk="eye">👁 숫자 보기</button>'
      +'<div class="lk-err" id="lk-err"></div>'
      +'<button class="lk-btn" data-lk="owner-go">마스터 모드 들어가기 →</button>'
      +'<div class="lk-sub"><button class="lk-link" data-lk="cancel-ov">← 직원 모드로 (취소)</button></div>';
  } else if(_lockMode==='admin'){
    body='<div class="lk-title">🔧 관리자 페이지</div>'
      +'<div class="lk-desc">마스터 비밀번호를 입력하면<br>직원·마스터 비밀번호를 바꿀 수 있어요.</div>'
      +pinRow('a')
      +'<button class="lk-eye" data-lk="eye">👁 숫자 보기</button>'
      +'<div class="lk-err" id="lk-err"></div>'
      +'<button class="lk-btn" data-lk="admin-go">확인 →</button>'
      +'<div class="lk-sub"><button class="lk-link" data-lk="to-login">← 돌아가기</button></div>';
  } else if(_lockMode==='adminmenu'){
    body='<div class="lk-title">🔧 관리자 페이지</div><div class="lk-desc" style="margin-bottom:6px">직원·마스터 비밀번호 설정</div>'
      +'<div class="adm-card"><div class="lk-flabel">👷 직원 모드 비밀번호 변경 (로그인 · 숫자 4자리)</div>'
      +pinRow('a')+'<div class="lk-flabel" style="margin-top:9px">한 번 더</div>'+pinRow('b')
      +'<button class="lk-eye" data-lk="eye">👁 숫자 보기</button>'
      +'<button class="lk-btn sm" data-lk="adm-savepin">직원 비밀번호 저장</button></div>'
      +'<div class="adm-card"><div class="lk-flabel">🔑 마스터 비밀번호 변경 (전체 열기 · 숫자 4자리)</div>'
      +pinRow('c')+'<div class="lk-flabel" style="margin-top:9px">한 번 더</div>'+pinRow('d')
      +'<button class="lk-btn sm" data-lk="adm-saveadmin">마스터 비밀번호 저장</button></div>'
      +'<div class="lk-err" id="lk-err"></div>'
      +'<div class="lk-sub"><button class="lk-link" data-lk="adm-resetpin">직원 비밀번호 초기화</button>'
      +'<button class="lk-link" data-lk="to-login">완료 · 돌아가기</button></div>';
  }
  c.innerHTML=head+body;
  const fy=document.getElementById('lk-fairy');if(fy)fy.innerHTML=FAIRY;
  const f1=c.querySelector('.pin-box');if(f1)setTimeout(()=>f1.focus(),60);
}
(function(){
  const ov=document.getElementById('lk-ov');if(!ov)return;
  ov.addEventListener('input',e=>{const b=e.target.closest('.pin-box');if(!b)return;
    b.value=b.value.replace(/\D/g,'').slice(0,1);b.classList.toggle('on',!!b.value);
    if(b.value){const nx=b.nextElementSibling;if(nx&&nx.classList.contains('pin-box'))nx.focus();}});
  ov.addEventListener('keydown',e=>{const b=e.target.closest('.pin-box');if(!b)return;
    if(e.key==='Backspace'&&!b.value){const pv=b.previousElementSibling;if(pv&&pv.classList.contains('pin-box')){pv.focus();pv.value='';pv.classList.remove('on');}}
    if(e.key==='Enter'){const btn=document.querySelector('#lk-card .lk-btn');if(btn)btn.click();}});
  ov.addEventListener('click',e=>{
    const t=e.target.closest('[data-lk]');if(!t)return;
    const act=t.dataset.lk, err=document.getElementById('lk-err');
    const clr=pg=>document.querySelectorAll('.pin-row[data-pg="'+pg+'"] .pin-box').forEach(x=>{x.value='';x.classList.remove('on');});
    const ok=m=>{if(err){err.style.color='var(--sage)';err.textContent=m;}};
    const fail=m=>{if(err){err.style.color='';err.textContent=m;}const r=document.querySelector('#lk-card .pin-row');if(r){r.classList.remove('shake');void r.offsetWidth;r.classList.add('shake');}};
    if(act==='eye'){document.querySelectorAll('#lk-card .pin-box').forEach(b=>b.classList.toggle('reveal'));return;}
    if(act==='to-admin'){showLock('admin');return;}
    if(act==='to-login'){showLock(pinSet()?'login':'setup');return;}
    if(act==='setup-go'){const a=pinVal('a'),b=pinVal('b');if(a.length!==4)return fail('숫자 4자리를 입력하세요');if(a!==b)return fail('두 번 입력한 비밀번호가 달라요');setPin(a);localStorage.setItem(A_REMEMBER,'1');toast('🔒 비밀번호가 설정됐어요');enterApp();return;}
    if(act==='login-go'){const a=pinVal('a');if(!pinMatches(a))return fail('비밀번호가 일치하지 않아요');const rm=document.getElementById('lk-remember');if(rm&&rm.checked)localStorage.setItem(A_REMEMBER,'1');else localStorage.removeItem(A_REMEMBER);enterApp();return;}
    if(act==='owner-go'){const a=pinVal('a');if(!adminMatches(a))return fail('마스터 비밀번호가 아니에요');role='owner';sessionStorage.setItem('apri_role','owner');document.getElementById('lk-ov').classList.remove('show');window.scrollTo(0,0);render();toast('🔑 마스터 모드로 들어왔어요');return;}
    if(act==='cancel-ov'){document.getElementById('lk-ov').classList.remove('show');return;}
    if(act==='admin-go'){const a=pinVal('a');if(!adminMatches(a))return fail('마스터 비밀번호가 아니에요');showLock('adminmenu');return;}
    if(act==='adm-savepin'){const a=pinVal('a'),b=pinVal('b');if(a.length!==4)return fail('새 비밀번호 4자리를 입력하세요');if(a!==b)return fail('두 번 입력이 달라요');setPin(a);clr('a');clr('b');ok('✓ 직원 비밀번호가 변경됐어요');toast('✓ 직원 비밀번호 변경 완료');return;}
    if(act==='adm-saveadmin'){const cv=pinVal('c'),dv=pinVal('d');if(cv.length!==4)return fail('마스터 비밀번호 4자리를 입력하세요');if(cv!==dv)return fail('두 번 입력한 마스터 비밀번호가 달라요');localStorage.setItem(A_ADMIN,aHash(cv));clr('c');clr('d');ok('✓ 마스터 비밀번호가 변경됐어요');toast('✓ 마스터 비밀번호 변경 완료');return;}
    if(act==='adm-resetpin'){if(!confirm('직원(로그인) 비밀번호를 초기화할까요?\n다음 입장 때 새 비밀번호를 다시 정하게 됩니다.'))return;localStorage.removeItem(A_PIN);localStorage.removeItem(A_REMEMBER);toast('직원 비밀번호가 초기화됐어요');showLock('setup');return;}
  });
})();
function authBoot(){ if(isAuthed()){enterApp();} else { showLock(); } }

render();
if(cloudOn()){cloudPullApply().then(ok=>{if(ok)render();});}
authBoot();
</script>
